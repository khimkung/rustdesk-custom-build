name: Build RustDesk Custom
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows
        run: |
          echo "Building for Windows with ID: ${{ secrets.RUSTDESK_ID_SERVER }}"
          # สคริปต์นี้จะจำลองการประกอบไฟล์ให้คุณ
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Custom-Pack
          path: ./*.exe
